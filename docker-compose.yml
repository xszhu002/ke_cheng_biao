version: '3.8'

services:
  # 后端API服务
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: kechengbiao-backend
    ports:
      - "301:301"  # 后端API端口
    volumes:
      - ./database:/app/database  # 数据库文件映射
    environment:
      - NODE_ENV=production
      - PORT=301
    restart: unless-stopped
    networks:
      - kechengbiao-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:301/api/admin/check', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  kechengbiao-network:
    driver: bridge

volumes:
  database:
    driver: local 